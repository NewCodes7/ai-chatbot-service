<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>대화 | AI Chatbot Service</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="app-body">
<header class="site-header app-header">
    <a class="brand" th:href="@{/}">AI Chatbot Service</a>
    <nav class="nav-actions" aria-label="주요 메뉴">
        <a class="secondary-button" th:href="@{/feedback}">피드백</a>
        <a class="secondary-button" th:href="@{/analytics}">분석</a>
        <button class="secondary-button" id="refreshButton" type="button">새로고침</button>
        <button class="link-button" id="logoutButton" type="button">로그아웃</button>
    </nav>
</header>

<main class="chat-shell">
    <aside class="thread-panel" aria-label="대화 기록">
        <div class="panel-heading">
            <div>
                <p class="eyebrow">Conversation</p>
                <h1>대화</h1>
            </div>
            <button class="secondary-button compact" id="newChatButton" type="button">새 대화</button>
        </div>

        <div class="quick-prompts" aria-label="예시 질문">
            <button type="button" data-prompt="ISA와 연금저축의 차이를 고객에게 설명해줘.">ISA와 연금저축 비교</button>
            <button type="button" data-prompt="KOSPI와 KOSDAQ 지표를 어떻게 해석해야 해?">시장 지표 해석</button>
            <button type="button" data-prompt="초보 투자자에게 분산투자를 쉽게 설명해줘.">분산투자 설명</button>
        </div>

        <div class="thread-list" id="threadList" aria-live="polite"></div>
    </aside>

    <section class="chat-workspace" aria-label="챗봇 대화">
        <div class="chat-toolbar">
            <div>
                <p class="eyebrow">RAG Financial Assistant</p>
                <h2>금융 문서 기반 챗봇</h2>
            </div>
            <span class="status-pill" id="statusPill">대기 중</span>
        </div>

        <div class="message-list" id="messageList" aria-live="polite">
            <div class="empty-state">
                <strong>질문을 입력하면 문서 검색 후 답변합니다.</strong>
                <p>금융 상품, 투자 기초, 시장 지표 문서에 기반한 답변을 확인할 수 있습니다.</p>
            </div>
        </div>

        <form class="chat-composer" id="chatForm">
            <label class="sr-only" for="questionInput">질문</label>
            <textarea id="questionInput" name="question" rows="3" placeholder="예: ISA와 연금저축의 차이를 고객에게 설명해줘." required></textarea>
            <div class="composer-actions">
                <label class="stream-toggle">
                    <input id="streamingInput" type="checkbox" checked>
                    <span>스트리밍</span>
                </label>
                <button class="primary-button" id="sendButton" type="submit">전송</button>
            </div>
        </form>
    </section>
</main>

<script th:src="@{/js/chat.js}"></script>
<script>
    window.chatPage.init();
</script>
</body>
</html>
