<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>피드백 | AI Chatbot Service</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="app-body">
<header class="site-header app-header">
    <a class="brand" th:href="@{/}">AI Chatbot Service</a>
    <nav class="nav-actions" aria-label="주요 메뉴">
        <a class="secondary-button" th:href="@{/app}">대화</a>
        <button class="secondary-button" id="refreshButton" type="button">새로고침</button>
        <button class="link-button" id="logoutButton" type="button">로그아웃</button>
    </nav>
</header>

<main class="feedback-shell">
    <section class="feedback-panel" aria-labelledby="feedback-form-title">
        <div class="panel-heading">
            <div>
                <p class="eyebrow">Feedback</p>
                <h1 id="feedback-form-title">답변 피드백</h1>
            </div>
            <span class="status-pill" id="statusPill">대기 중</span>
        </div>

        <form class="feedback-form" id="feedbackForm" novalidate>
            <label for="chatIdInput">채팅 ID</label>
            <input id="chatIdInput" name="chatId" type="number" min="1" placeholder="예: 12" required>

            <fieldset class="rating-group">
                <legend>평가</legend>
                <label>
                    <input type="radio" name="isPositive" value="true" checked>
                    <span>도움됨</span>
                </label>
                <label>
                    <input type="radio" name="isPositive" value="false">
                    <span>개선 필요</span>
                </label>
            </fieldset>

            <p class="form-message" id="formMessage" role="status" aria-live="polite"></p>
            <button class="primary-button full" id="submitButton" type="submit">피드백 등록</button>
        </form>
    </section>

    <section class="feedback-panel feedback-list-panel" aria-labelledby="feedback-list-title">
        <div class="panel-heading">
            <div>
                <p class="eyebrow">History</p>
                <h2 id="feedback-list-title">내 피드백</h2>
            </div>
            <div class="list-controls">
                <select id="sortSelect" aria-label="정렬">
                    <option value="desc">최신순</option>
                    <option value="asc">오래된순</option>
                </select>
            </div>
        </div>

        <div class="feedback-list" id="feedbackList" aria-live="polite"></div>

        <div class="pagination-bar">
            <button class="secondary-button compact" id="prevButton" type="button">이전</button>
            <span id="pageInfo">1 / 1</span>
            <button class="secondary-button compact" id="nextButton" type="button">다음</button>
        </div>
    </section>
</main>

<script th:src="@{/js/feedback.js}"></script>
<script>
    window.feedbackPage.init();
</script>
</body>
</html>
