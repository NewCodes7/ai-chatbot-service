<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>회원가입 | AI Chatbot Service</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<header class="site-header">
    <a class="brand" th:href="@{/}">AI Chatbot Service</a>
    <nav class="nav-actions" aria-label="주요 메뉴">
        <a class="link-button" th:href="@{/login}">로그인</a>
    </nav>
</header>

<main class="auth-shell">
    <section class="auth-card" aria-labelledby="signup-title">
        <p class="eyebrow">Create account</p>
        <h1 id="signup-title">회원가입</h1>
        <p class="auth-description">간단한 계정을 만들고 금융 문서 기반 챗봇 API를 테스트할 수 있습니다.</p>

        <form class="auth-form" id="signupForm" novalidate>
            <label for="name">이름</label>
            <input id="name" name="name" type="text" autocomplete="name" placeholder="홍길동" required>

            <label for="email">이메일</label>
            <input id="email" name="email" type="email" autocomplete="email" placeholder="user@example.com" required>

            <label for="password">비밀번호</label>
            <input id="password" name="password" type="password" autocomplete="new-password" placeholder="8자 이상" minlength="8" required>

            <p class="form-message" id="formMessage" role="status" aria-live="polite"></p>
            <button class="primary-button full" type="submit">회원가입</button>
        </form>

        <p class="auth-switch">이미 계정이 있나요? <a th:href="@{/login}">로그인</a></p>
    </section>
</main>

<script th:src="@{/js/auth.js}"></script>
<script>
    window.authPage.initSignup();
</script>
</body>
</html>
