<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>분석 | AI Chatbot Service</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="app-body analytics-body">
<header class="site-header app-header">
    <a class="brand" th:href="@{/}">AI Chatbot Service</a>
    <nav class="nav-actions" aria-label="주요 메뉴">
        <a class="secondary-button" th:href="@{/app}">대화</a>
        <a class="secondary-button" th:href="@{/feedback}">피드백</a>
        <button class="secondary-button" id="refreshAnalyticsButton" type="button">새로고침</button>
        <button class="link-button" id="logoutButton" type="button">로그아웃</button>
    </nav>
</header>

<main class="analytics-shell">
    <section class="analytics-hero" aria-labelledby="analyticsTitle">
        <div>
            <p class="eyebrow">Analytics</p>
            <h1 id="analyticsTitle">운영 분석</h1>
            <p class="analytics-copy">최근 24시간 가입, 로그인, 대화 생성 흐름을 확인하고 대화 리포트를 CSV로 내려받습니다.</p>
        </div>
        <div class="analytics-actions">
            <span class="status-pill" id="analyticsStatus">대기 중</span>
            <button class="primary-button" id="downloadReportButton" type="button">CSV 다운로드</button>
        </div>
    </section>

    <section class="metric-grid" aria-label="최근 24시간 활동 지표">
        <article class="metric-card">
            <span>가입</span>
            <strong id="signupCount">-</strong>
            <p>새로 생성된 계정</p>
        </article>
        <article class="metric-card">
            <span>로그인</span>
            <strong id="loginCount">-</strong>
            <p>인증 성공 기록</p>
        </article>
        <article class="metric-card">
            <span>대화</span>
            <strong id="chatCount">-</strong>
            <p>생성된 질문/답변</p>
        </article>
    </section>

    <section class="report-panel" aria-labelledby="reportTitle">
        <div>
            <p class="eyebrow">Report</p>
            <h2 id="reportTitle">대화 리포트</h2>
            <p>최근 24시간 대화 데이터를 사용자, 스레드, 질문, 답변, 생성 시각 컬럼으로 다운로드합니다.</p>
        </div>
        <div class="report-preview" id="reportPreview" aria-live="polite">
            <strong>아직 데이터를 불러오지 않았습니다.</strong>
            <span>새로고침을 누르면 최신 활동 지표를 확인합니다.</span>
        </div>
    </section>
</main>

<script th:src="@{/js/analytics.js}"></script>
<script>
    window.analyticsPage.init();
</script>
</body>
</html>
