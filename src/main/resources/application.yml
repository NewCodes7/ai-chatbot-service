spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:chatbot}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

gemini:
  api-key: ${GEMINI_API_KEY:}
  chat-model: gemini-3.5-flash
  embedding-model: gemini-embedding-2
  allowed-models:
    - gemini-3.5-flash
    - gemini-2.5-flash
    - gemini-2.0-flash

jwt:
  # PRODUCTION_TODO: Reduce to 1h and implement refresh token rotation
  expiration: 604800000
  # PRODUCTION_TODO: Replace with a strong random secret via environment variable (must be ≥ 32 bytes)
  secret: ${JWT_SECRET:ai-chatbot-service-jwt-secret-key-for-development-only}

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always
